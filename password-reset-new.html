<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cinemaverse – Reset Password</title>
  <link rel="stylesheet" href="shared-navbar.css">
  <script src="shared-navbar.js" defer></script>
  <script src="card-search.js" defer></script>
  <script src="performance-utils.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Electrolize&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Electrolize',sans-serif;background:#000;color:#fff;margin:0}
    .page-wrap{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 56px);padding:20px}
    .card{background:#111;padding:24px;border-radius:10px;max-width:360px;width:100%;box-shadow:0 6px 20px rgba(0,0,0,.5)}
    h1{color:#f00;font-size:1.4rem;margin:0 0 10px}
    p{color:#bbb;margin:0 0 16px}
    input,button{width:100%;padding:12px;border-radius:8px;border:1px solid #333;margin:8px 0}
    input{background:#000;color:#fff}
    button{background:#f00;color:#fff;border:none;font-weight:700;cursor:pointer}
    button:hover{opacity:.9}
    .msg{margin-top:10px;color:#9cf}
    .err{color:#f77}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="auth.js" defer></script> <!-- must create the supabase client -->
</head>
<body>
  <div class="navbar">
    <div class="navbar-wrapper">
      <div class="logo-wrapper">
        <h1 class="logo">Cinemaverse</h1>
      </div>
      <div class="menu-container">
        <ul class="menu-list">
          <li class="menu-list-item"><a href="index.html">Home</a></li>
          <li class="menu-list-item"><a href="movies.html">Movies</a></li>
          <li class="menu-list-item"><a href="series.html">Series</a></li>
          <li class="menu-list-item"><a href="watchlist.html">Watchlist</a></li>
          <li class="menu-list-item"><a href="gallery.html">Gallery</a></li>
          <li class="menu-list-item"><a href="contact.html">Contact Us</a></li>
          <li class="menu-list-item"><a href="about.html">About Us</a></li>
        </ul>
      </div>
      <div class="profile-container">
        <a href="login.html" class="auth-button login-button">Login</a>
        <a href="javascript:void(0)" onclick="logout()" class="auth-button logout-button" style="display:none;">Logout</a>
      </div>
    </div>
  </div>

  <div class="page-wrap">
    <div class="card">
      <h1>Reset your password</h1>
      <p>Enter a new password for your account.</p>
      <input id="newpass" type="password" placeholder="New password" />
      <button id="setpass">Update Password</button>
      <div id="out" class="msg"></div>
    </div>
  </div>

  <script>
    async function getClient() {
      return window.supabaseClient || (typeof window.ensureSupabaseClient === 'function' ? await window.ensureSupabaseClient() : null);
    }

    // On this page, the user arrives via Supabase recovery link (with a short-lived access token).
    // We just call updateUser with the new password.
    document.getElementById('setpass').addEventListener('click', async () => {
      const out = document.getElementById('out');
      out.textContent = '';

      const newpass = (document.getElementById('newpass').value || '').trim();
      if (newpass.length < 6) {
        out.textContent = 'Password must be at least 6 characters.';
        out.className = 'msg err';
        return;
      }

      try {
        const client = await getClient();
        if (!client) {
          out.textContent = 'Authentication is not ready. Please refresh and try again.';
          out.className = 'msg err';
          return;
        }

        const { data, error } = await client.auth.updateUser({ password: newpass });
        if (error) {
          out.textContent = 'Error: ' + error.message;
          out.className = 'msg err';
          return;
        }
        out.textContent = 'Password updated. Redirecting to login…';
        out.className = 'msg';
        setTimeout(() => location.href = 'login.html', 1200);
      } catch (e) {
        out.textContent = 'Unexpected error: ' + e.message;
        out.className = 'msg err';
      }
    });
  </script>
</body>
</html>

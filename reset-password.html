<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reset Password - Cinemaverse</title>
  <link rel="stylesheet" href="shared-navbar.css">
  <script src="shared-navbar.js" defer></script>
  <script src="card-search.js" defer></script>
  <script src="performance-utils.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Electrolize&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="auth.js" defer></script>
  <style>
    body{margin:0; font-family:'Electrolize',sans-serif; background:#000; color:#fff;}
    .wrap{min-height:calc(100dvh - 56px); display:flex; align-items:center; justify-content:center; padding:20px;}
    .card{width:100%; max-width:420px; background:#111; border-radius:12px; padding:24px; box-shadow:0 8px 16px rgba(0,0,0,.6);}
    h1{margin:0 0 12px; color:#f00; text-align:center; font-size:28px;}
    p{margin:0 0 16px; color:#ddd; text-align:center;}
    input{width:100%; padding:12px; border:0; border-radius:6px; background:#222; color:#fff;}
    button{width:100%; margin-top:14px; padding:12px; border:0; border-radius:6px; background:#f00; color:#fff; font-weight:700; cursor:pointer;}
    button:hover{background:#c20000;}
    .msg{margin-top:12px; text-align:center; color:#9fe29f; display:none;}
    .err{margin-top:12px; text-align:center; color:#ff6b6b; display:none;}
  </style>
</head>
<body>
  <div class="navbar">
    <div class="navbar-wrapper">
      <div class="logo-wrapper">
        <h1 class="logo">Cinemaverse</h1>
      </div>
      <div class="menu-container">
        <ul class="menu-list">
          <li class="menu-list-item"><a href="index.html">Home</a></li>
          <li class="menu-list-item"><a href="movies.html">Movies</a></li>
          <li class="menu-list-item"><a href="series.html">Series</a></li>
          <li class="menu-list-item"><a href="watchlist.html">Watchlist</a></li>
          <li class="menu-list-item"><a href="gallery.html">Gallery</a></li>
          <li class="menu-list-item"><a href="contact.html">Contact Us</a></li>
          <li class="menu-list-item"><a href="about.html">About Us</a></li>
        </ul>
      </div>
      <div class="profile-container">
        <a href="login.html" class="auth-button login-button">Login</a>
        <a href="javascript:void(0)" onclick="logout()" class="auth-button logout-button" style="display:none;">Logout</a>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <h1>Set New Password</h1>
      <p>Enter a new password for your account.</p>
      <input id="new-pass" type="password" placeholder="New password (min 6 chars)" />
      <button id="update-btn">Update Password</button>
      <div id="ok" class="msg">Password updated. Redirecting…</div>
      <div id="er" class="err">Error</div>
    </div>
  </div>

  <script>
    async function getClient() {
      return window.supabaseClient || (typeof window.ensureSupabaseClient === 'function' ? await window.ensureSupabaseClient() : null);
    }

    document.getElementById('update-btn')?.addEventListener('click', async () => {
      const ok = document.getElementById('ok');
      const er = document.getElementById('er');
      ok.style.display = 'none'; er.style.display = 'none';

      const pwd = document.getElementById('new-pass').value.trim();
      if (pwd.length < 6) { er.textContent='Password too short'; er.style.display='block'; return; }

      const client = await getClient();
      if (!client) {
        er.textContent = 'Authentication is not ready. Please refresh and try again.';
        er.style.display = 'block';
        return;
      }

      // When user lands here from email link, Supabase session is present (access token in URL).
      const { error } = await client.auth.updateUser({ password: pwd });

      if (error) { er.textContent = error.message; er.style.display='block'; return; }

      ok.style.display = 'block';
      setTimeout(() => { window.location.href = 'login.html'; }, 1200);
    });
  </script>
</body>
</html>

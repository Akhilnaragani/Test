<!DOCTYPE html>
<html lang=en>

<head>
    <meta charset=UTF-8>
    <meta name=viewport content="width=device-width, initial-scale=1.0">
    <title>Cinemaverse - Login & Sign Up</title>
    <style>
        :root {
            --bg-black: #060606;
            --bg-deep: #120606;
            --text-main: #ffffff;
            --text-muted: #d7d7d7;
            --red-1: #ff2f2f;
            --red-2: #a70000;
            --line-soft: rgba(255, 255, 255, 0.14);
            --line-focus: rgba(255, 76, 76, 0.95);
            --glass: rgba(17, 17, 17, 0.52);
            --glow: rgba(255, 34, 34, 0.45)
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background:
                radial-gradient(circle at 16% 18%, rgba(168, 0, 0, 0.32), transparent 40%),
                radial-gradient(circle at 86% 84%, rgba(255, 45, 45, 0.2), transparent 42%),
                linear-gradient(120deg, var(--bg-black), var(--bg-deep) 45%, #030303 100%);
            font-family: 'Electrolize', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow-x: hidden;
            position: relative
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.018) 0, rgba(255, 255, 255, 0.018) 1px, transparent 1px, transparent 4px);
            opacity: .18;
            z-index: 0
        }

        .login-page .menu-container,
        .login-page .profile-container,
        .login-page .search-container,
        .login-page .search,
        .login-page .search-box,
        .login-page .navbar input {
            display: none !important
        }

        .login-page .navbar-wrapper {
            position: relative;
            display: flex;
            justify-content: center !important;
            align-items: center;
        }

        .login-page .logo-wrapper {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            margin: 0 auto
        }

        main {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            padding: 50px 18px 70px;
            position: relative;
            z-index: 1
        }

        .form-container {
            background: var(--glass);
            padding: 34px 30px 28px;
            border-radius: 20px;
            border: 1px solid var(--line-soft);
            box-shadow: 0 0 0 1px rgba(255, 62, 62, 0.1), 0 22px 55px rgba(0, 0, 0, 0.6), 0 0 38px rgba(255, 35, 35, 0.18);
            max-width: 470px;
            width: min(100%, 470px);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            animation: fadeLift .55s ease-out both;
            transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease
        }

        .form-container:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 86, 86, 0.45);
            box-shadow: 0 0 0 1px rgba(255, 62, 62, 0.18), 0 28px 64px rgba(0, 0, 0, 0.68), 0 0 42px rgba(255, 41, 41, 0.28)
        }

        h2 {
            color: #ff4d4d;
            text-align: center;
            margin-bottom: 24px;
            letter-spacing: .8px;
            text-transform: uppercase
        }

        .form-group {
            margin-bottom: 18px
        }

        .form-group label {
            display: block;
            font-size: 1.1em;
            margin-bottom: 5px;
            color: white
        }

        .floating-group {
            position: relative;
            margin-bottom: 22px
        }

        .floating-group input {
            width: 100%;
            height: 54px;
            padding: 18px 14px 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(20, 20, 20, 0.84);
            color: var(--text-main);
            font-size: 1rem;
            transition: border-color .25s ease, box-shadow .25s ease, background-color .25s ease, transform .2s ease
        }

        .floating-group input:hover {
            border-color: rgba(255, 255, 255, 0.32)
        }

        .floating-group input:focus {
            outline: 0;
            border-color: var(--line-focus);
            box-shadow: 0 0 0 3px rgba(255, 37, 37, 0.2), 0 0 16px rgba(255, 30, 30, 0.18);
            background-color: rgba(22, 22, 22, 0.95);
            transform: translateY(-1px)
        }

        .floating-group label {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            padding: 0 6px;
            color: var(--text-muted);
            font-size: .95rem;
            pointer-events: none;
            transition: top .2s ease, transform .2s ease, color .2s ease, font-size .2s ease, background-color .2s ease;
            background: transparent
        }

        .floating-group input:focus+label,
        .floating-group input:not(:placeholder-shown)+label {
            top: 0;
            transform: translateY(-50%);
            font-size: .73rem;
            color: #ff8585;
            background: rgba(15, 15, 15, 0.94)
        }

        .form-button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(120deg, var(--red-1), var(--red-2));
            color: var(--text-main);
            border: 0;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.05em;
            letter-spacing: .4px;
            font-weight: 700;
            box-shadow: 0 10px 24px rgba(198, 0, 0, 0.36);
            transition: transform .2s ease, box-shadow .2s ease, filter .2s ease
        }

        .form-button:hover {
            transform: translateY(-2px) scale(1.01);
            filter: brightness(1.05);
            box-shadow: 0 12px 28px rgba(232, 0, 0, 0.42), 0 0 12px rgba(255, 54, 54, 0.35)
        }

        .form-button:active {
            transform: translateY(0) scale(.99)
        }

        .form-button:disabled {
            cursor: not-allowed;
            opacity: .7;
            filter: grayscale(.15)
        }

        .form-footer {
            text-align: center;
            margin-top: 15px;
            color: var(--text-muted)
        }

        .form-footer a {
            color: #ff5757;
            text-decoration: none;
            font-weight: bold;
            transition: color .2s ease, text-shadow .2s ease
        }

        .form-footer a:hover {
            color: #ff8f8f;
            text-shadow: 0 0 8px var(--glow)
        }

        .form-toggle {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
            padding: 4px;
            border-radius: 999px;
            background: rgba(9, 9, 9, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.12)
        }

        .toggle-btn {
            background: transparent;
            color: #d0d0d0;
            padding: 11px 20px;
            border: 0;
            cursor: pointer;
            flex: 1;
            font-weight: bold;
            border-radius: 999px;
            font-size: .96rem;
            letter-spacing: .4px;
            transition: color .2s ease, background-color .2s ease, box-shadow .2s ease, transform .2s ease
        }

        .toggle-btn.active {
            color: #fff;
            background: linear-gradient(120deg, rgba(255, 49, 49, 0.96), rgba(167, 0, 0, 0.96));
            box-shadow: 0 8px 18px rgba(208, 0, 0, 0.36), inset 0 0 0 1px rgba(255, 255, 255, 0.1)
        }

        .toggle-btn:not(.active):hover {
            color: #f1f1f1;
            background: rgba(255, 255, 255, 0.06)
        }

        .auth-form {
            animation: fadeIn .35s ease both
        }

        .forgot-link-wrap {
            text-align: center;
            margin-top: 12px;
            margin-bottom: 2px
        }

        #open-forgot {
            color: #ff6666;
            text-decoration: none;
            transition: color .2s ease, text-shadow .2s ease
        }

        #open-forgot:hover {
            color: #ff8f8f;
            text-shadow: 0 0 8px rgba(255, 67, 67, 0.42)
        }

        #forgot-modal {
            position: fixed;
            inset: 0;
            background: rgba(2, 2, 2, 0.78);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px)
        }

        .forgot-card {
            background: rgba(20, 20, 20, 0.8);
            color: #fff;
            width: min(90%, 430px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            box-shadow: 0 24px 62px rgba(0, 0, 0, 0.58), 0 0 28px rgba(255, 35, 35, 0.2);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            padding: 24px;
            animation: popIn .28s ease both
        }

        .forgot-card h2 {
            margin-bottom: 10px
        }

        .forgot-card p {
            text-align: center;
            color: #cccccc;
            margin-bottom: 16px
        }

        #forgot-email {
            width: 100%;
            height: 48px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 10px;
            background: rgba(16, 16, 16, 0.86);
            color: #fff;
            transition: border-color .2s ease, box-shadow .2s ease
        }

        #forgot-email:focus {
            outline: 0;
            border-color: var(--line-focus);
            box-shadow: 0 0 0 3px rgba(255, 0, 0, 0.15)
        }

        #send-reset,
        #close-forgot {
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
            transition: transform .2s ease, box-shadow .2s ease, background-color .2s ease
        }

        #send-reset {
            margin-top: 14px;
            padding: 12px;
            border: 0;
            background: linear-gradient(120deg, var(--red-1), var(--red-2));
            color: #fff;
            font-weight: 700;
            box-shadow: 0 10px 24px rgba(194, 0, 0, 0.35)
        }

        #send-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 13px 28px rgba(226, 0, 0, 0.42), 0 0 12px rgba(255, 52, 52, 0.35)
        }

        #close-forgot {
            margin-top: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.32);
            color: #e1e1e1
        }

        #close-forgot:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.08)
        }

        #forgot-ok,
        #forgot-error {
            display: none;
            text-align: center;
            margin-top: 10px
        }

        #forgot-ok {
            color: #9fe29f
        }

        #forgot-error {
            color: #ff6b6b
        }

        @keyframes fadeLift {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(.95) translateY(8px)
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0)
            }
        }

        @media (max-width: 560px) {
            main {
                padding: 32px 14px 56px
            }

            .form-container {
                padding: 24px 18px 20px;
                border-radius: 16px
            }

            h2 {
                font-size: 1.28rem
            }

            .toggle-btn {
                padding: 10px 12px;
                font-size: .88rem
            }

            .floating-group input {
                height: 50px
            }
        }
    </style>

    <script src="shared-navbar.js" defer></script>

    <script>
        let loginInFlight = false;
        const SUPABASE_FALLBACK_URL = 'https://hvbeswqunsadayqghhzv.supabase.co';
        const SUPABASE_FALLBACK_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2YmVzd3F1bnNhZGF5cWdoaHp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI1NjQzNjcsImV4cCI6MjA3ODE0MDM2N30.rDvyGxFt8XO632S1Zw0ZANvYZaSsGgSb_pW49DXMMMg';

        function loadScript(url, timeoutMs = 5000) {
            return new Promise((resolve, reject) => {
                const existing = document.querySelector(`script[src="${url}"]`);
                if (existing) {
                    setTimeout(resolve, 0);
                    return;
                }

                const script = document.createElement('script');
                script.src = url;
                script.async = true;

                const timeout = setTimeout(() => {
                    script.remove();
                    reject(new Error(`Timed out loading ${url}`));
                }, timeoutMs);

                script.onload = () => {
                    clearTimeout(timeout);
                    resolve();
                };
                script.onerror = () => {
                    clearTimeout(timeout);
                    script.remove();
                    reject(new Error(`Failed to load ${url}`));
                };

                document.head.appendChild(script);
            });
        }

        async function ensureSupabaseSdkInLogin() {
            if (window.supabase && typeof window.supabase.createClient === 'function') {
                return true;
            }

            const urls = [
                'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2',
                'https://unpkg.com/@supabase/supabase-js@2'
            ];

            for (const url of urls) {
                try {
                    await loadScript(url);
                    if (window.supabase && typeof window.supabase.createClient === 'function') {
                        return true;
                    }
                } catch (error) {
                    console.warn('[auth] Login SDK fallback failed for', url, error);
                }
            }

            return false;
        }

        async function getAuthClient() {
            let client = window.supabaseClient;

            if (!client && typeof window.ensureSupabaseClient === 'function') {
                try {
                    client = await window.ensureSupabaseClient();
                } catch (error) {
                    console.error('[auth] Client readiness error:', error);
                }
            }

            // Last-resort fallback: build a client directly if auth.js helper is not available.
            if (!client && window.supabase && typeof window.supabase.createClient === 'function' && window.__SUPABASE_CONFIG) {
                try {
                    const cfg = window.__SUPABASE_CONFIG;
                    client = window.supabase.createClient(cfg.url, cfg.anonKey, {
                        auth: {
                            persistSession: true,
                            autoRefreshToken: true,
                            detectSessionInUrl: true,
                            storage: window.localStorage
                        }
                    });
                    window.supabaseClient = client;
                    console.warn('[auth] Using login page fallback client initialization.');
                } catch (error) {
                    console.error('[auth] Fallback client initialization failed:', error);
                }
            }

            // Hard fallback for cases where auth.js did not initialize config/helpers.
            if (!client) {
                const sdkReady = await ensureSupabaseSdkInLogin();
                if (sdkReady && window.supabase && typeof window.supabase.createClient === 'function') {
                    try {
                        client = window.supabase.createClient(SUPABASE_FALLBACK_URL, SUPABASE_FALLBACK_ANON_KEY, {
                            auth: {
                                persistSession: true,
                                autoRefreshToken: true,
                                detectSessionInUrl: true,
                                storage: window.localStorage
                            }
                        });
                        window.supabaseClient = client;
                        console.warn('[auth] Using hard fallback login client initialization.');
                    } catch (error) {
                        console.error('[auth] Hard fallback client initialization failed:', error);
                    }
                }
            }

            if (!client) {
                console.error('[auth] Supabase client missing. Ensure @supabase/supabase-js CDN and auth.js load successfully.');
                alert('Authentication service is not ready. Please check your connection and try again.');
                return null;
            }

            return client;
        }

        function getSafeRedirectTarget() {
            const fallback = 'index.html';
            const raw = new URLSearchParams(window.location.search).get('redirect');

            if (!raw) return fallback;
            const lower = raw.trim().toLowerCase();
            if (!lower) return fallback;
            if (lower.startsWith('http://') || lower.startsWith('https://') || lower.startsWith('//') || lower.startsWith('javascript:')) {
                return fallback;
            }

            return raw;
        }

        async function waitForSession(client, timeoutMs = 1500) {
            const startedAt = Date.now();

            while (Date.now() - startedAt < timeoutMs) {
                const { data, error } = await client.auth.getSession();
                if (error) {
                    console.error('[auth] waitForSession error:', error);
                    return null;
                }
                if (data?.session) {
                    return data.session;
                }

                await new Promise(resolve => setTimeout(resolve, 75));
            }

            return null;
        }

        function toggleForm(formType) {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const loginBtn = document.querySelector('button[onclick="toggleForm(\'login\')"]');
            const signupBtn = document.querySelector('button[onclick="toggleForm(\'signup\')"]');

            if (formType === 'login') {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
                loginBtn.classList.add('active');
                signupBtn.classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
                loginBtn.classList.remove('active');
                signupBtn.classList.add('active');
            }
        }

        // Login
        async function handleLogin(e) {
            e.preventDefault();

            if (loginInFlight) {
                return false;
            }

            const client = await getAuthClient();
            if (!client) {
                return false;
            }

            loginInFlight = true;
            const form = e.target;
            form.dataset.submitting = 'true';

            // Disable the submit button to prevent double clicks
            const submitButton = form.querySelector('button[type="submit"]');
            if (submitButton) submitButton.disabled = true;

            try {
                const email = document.getElementById("email").value.trim();
                const password = document.getElementById("password").value;

                console.log('[auth] Attempting login for:', email);
                const { data, error } = await client.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) {
                    console.error('[auth] Login error:', {
                        message: error.message,
                        status: error.status,
                        code: error.code,
                        error
                    });
                    alert(error.message);
                    return false;
                }

                if (data && data.user) {
                    console.log('[auth] Login successful for:', data.user.email);

                    if (data.session?.access_token && data.session?.refresh_token) {
                        try {
                            await client.auth.setSession({
                                access_token: data.session.access_token,
                                refresh_token: data.session.refresh_token
                            });
                        } catch (setSessionError) {
                            console.warn('[auth] setSession after login failed:', setSessionError);
                        }
                    }

                    const session = data.session || await waitForSession(client);
                    if (!session) {
                        console.warn('[auth] Login returned user but no active session.');
                        alert('Login did not create an active session. If your email is unconfirmed, please verify it and try again.');
                        return false;
                    }

                    localStorage.setItem("showGreeting", "yes");

                    const redirect = getSafeRedirectTarget();
                    window.location.replace(redirect);
                } else {
                    console.error('[auth] No user data received after signInWithPassword');
                    alert('Login failed. Please try again.');
                }
            } catch (err) {
                console.error('[auth] Unexpected error in handleLogin:', err);
                alert(err?.message || 'An unexpected error occurred. Please try again.');
            } finally {
                // Re-enable the submit button
                if (submitButton) submitButton.disabled = false;
                form.dataset.submitting = 'false';
                loginInFlight = false;
            }

            return false;
        }

        // Signup
        // Signup
        async function handleSignup(e) {
            e.preventDefault();

            const name = document.getElementById("name-signup").value.trim();
            const email = document.getElementById("email-signup").value.trim();
            const password = document.getElementById("password-signup").value;
            const confirm = document.getElementById("confirm-password-signup").value;

            if (password !== confirm) {
                alert("Passwords do not match!");
                return false;
            }

            // ✅ Store name as user metadata (automatically syncs to profiles table if trigger exists)
            const client = await getAuthClient();
            if (!client) {
                return false;
            }

            const { data, error } = await client.auth.signUp({
                email,
                password,
                options: {
                    data: { full_name: name }
                }
            });

            if (error) {
                alert(error.message);
                return false;
            }

            alert("Account created! Please log in.");
            toggleForm('login');
            return false;
        }




        // Google Sign-In
        async function handleGoogleSignIn() {
            const client = await getAuthClient();
            if (!client) {
                return;
            }

            const { error } = await client.auth.signInWithOAuth({ provider: 'google' });
            if (error) {
                alert(error.message);
            }
        }
    </script>

<!-- Forgot Password Modal -->
<div id="forgot-modal" style="display:none;">
    <div class="forgot-card">
        <h2>Reset Password</h2>
        <p>Enter your email to receive reset link.</p>

        <input id="forgot-email" type="email" placeholder="Email">

        <button id="send-reset">
      Send Reset Link
    </button>

        <button id="close-forgot">
      Cancel
    </button>

        <p id="forgot-ok">Link sent ✅</p>
        <p id="forgot-error">Error sending link</p>
  </div>
</div>

<script>
window.addEventListener('DOMContentLoaded', () => {
  const modal = document.getElementById("forgot-modal");
  const openBtn = document.getElementById("open-forgot");
  const closeBtn = document.getElementById("close-forgot");
  const sendBtn = document.getElementById("send-reset");
  const emailInput = document.getElementById("forgot-email");
  const ok = document.getElementById("forgot-ok");
  const err = document.getElementById("forgot-error");

  if (!openBtn || !modal) return; // safety

  openBtn.addEventListener('click', (e) => {
    e.preventDefault();
    modal.style.display = "flex";
  });

  closeBtn?.addEventListener('click', () => {
    modal.style.display = "none";
  });

  // Click outside to close
  modal.addEventListener('click', (e) => {
    if (e.target === modal) modal.style.display = "none";
  });

  sendBtn?.addEventListener('click', async () => {
    ok.style.display = "none";
    err.style.display = "none";

    const email = emailInput.value.trim();
    if (!email) {
      err.textContent = "Please enter your email.";
      err.style.display = "block";
      return;
    }

    try {
            const client = await getAuthClient();
            if (!client) return;

            const { error } = await client.auth.resetPasswordForEmail(email, {
        redirectTo: `${location.origin}/reset-password.html`
      });

      if (error) {
        err.textContent = error.message;
        err.style.display = "block";
      } else {
        ok.textContent = "Password reset link sent. Check your inbox 📩";
        ok.style.display = "block";
      }
    } catch {
      err.textContent = "Something went wrong. Try again.";
      err.style.display = "block";
    }
  });
});
</script>
